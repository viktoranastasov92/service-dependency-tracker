spring.application.name=service-dependency-tracker

# Neo4j — override these via environment variables or Docker Compose
spring.neo4j.uri=bolt://localhost:7687
spring.neo4j.authentication.username=neo4j
spring.neo4j.authentication.password=password

# Configurable traversal depth cap (ADR-005: depth bound as termination guarantee on cyclic graphs)
tracker.traversal.max-depth=50

# Swagger UI available at /swagger-ui.html
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

# Serve the hand-authored spec file directly rather than generating it from annotations
springdoc.swagger-ui.url=/openapi/api.yaml
